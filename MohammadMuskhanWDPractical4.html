<!DOCTYPE html>
<html>
<head>
    <title>Student Record Table</title>
</head>
<body>

    <h2 align="center">Student Record</h2>

    <table border="2" align="center" cellpadding="10" cellspacing="0">
        
        <!-- Table Header -->
        <thead>
            <tr>
                <th rowspan="2">Roll No</th>
                <th rowspan="2">Name</th>
                <th colspan="3">Marks</th>
                <th rowspan="2">Total</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>Science</th>
                <th>English</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <td>101</td>
                <td>Rahul</td>
                <td>85</td>
                <td>90</td>
                <td>80</td>
                <td>255</td>
            </tr>

            <tr>
                <td>102</td>
                <td>Sneha</td>
                <td>88</td>
                <td>92</td>
                <td>84</td>
                <td>264</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Amit</td>
                <td>75</td>
                <td>80</td>
                <td>70</td>
                <td>225</td>
            </tr>
        </tbody>

        <!-- Table Footer -->
        <tfoot>
            <tr>
                <td colspan="5" align="center"><b>Average Total</b></td>
                <td>248</td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
