<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

    <h2 align="center">Scholarship / Seminar Registration Form</h2>

    <form>

        <!-- Personal Details -->
        <fieldset>
            <legend>Personal Information</legend>

            Name: <input type="text" name="name" required><br><br>

            Email: <input type="email" name="email" required><br><br>

            Phone: <input type="tel" name="phone" required><br><br>

            Gender:
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
            <br><br>

            Date of Birth:
            <input type="date" name="dob"><br><br>

        </fieldset>

        <br>

        <!-- Course / Seminar Details -->
        <fieldset>
            <legend>Seminar Details</legend>

            Select Course:
            <select name="course">
                <option value="">--Select--</option>
                <option value="web">Web Development</option>
                <option value="ai">Artificial Intelligence</option>
                <option value="data">Data Science</option>
                <option value="cyber">Cyber Security</option>
            </select>
            <br><br>

            Mode:
            <input type="radio" name="mode" value="Online"> Online
            <input type="radio" name="mode" value="Offline"> Offline
            <br><br>

            Interests:
            <input type="checkbox" name="interest" value="coding"> Coding
            <input type="checkbox" name="interest" value="design"> Design
            <input type="checkbox" name="interest" value="research"> Research
            <br><br>

        </fieldset>

        <br>

        <!-- Address -->
        <fieldset>
            <legend>Address</legend>

            Address:<br>
            <textarea name="address" rows="4" cols="30"></textarea>
            <br><br>

            City:
            <input type="text" name="city"><br><br>

            State:
            <input type="text" name="state"><br><br>

        </fieldset>

        <br>

        <!-- Submit -->
        <fieldset>
            <legend>Submit</legend>

            <input type="submit" value="Register">
            <input type="reset" value="Clear">

        </fieldset>

    </form>

</body>
</html>
